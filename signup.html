<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Flash Edit Signup</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">

<style>

body{

margin:0;

font-family:'Roboto',sans-serif;

background:#0f0f0f;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

color:white;

overflow:hidden;

}

/* BACKGROUND */

.bg{

position:fixed;

inset:0;

background-image:url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f?q=80&w=1600&auto=format&fit=crop');

background-size:cover;

background-position:center;

filter:blur(10px);

opacity:0.25;

z-index:-1;

}

/* BOX */

.box{

width:400px;

background:#181818;

border:1px solid #272727;

padding:40px;

border-radius:28px;

box-shadow:
0 0 40px rgba(0,0,0,0.5);

}

/* LOGO */

.logo{

display:flex;

align-items:center;

justify-content:center;

gap:12px;

font-size:32px;

font-weight:900;

margin-bottom:30px;

}

.logo img{

width:45px;

height:45px;

object-fit:contain;

}

/* INPUTS */

input,
select{

width:100%;

padding:15px;

margin-top:16px;

background:#121212;

border:1px solid #333;

border-radius:16px;

color:white;

outline:none;

font-size:15px;

}

input:focus,
select:focus{

border-color:#ff0000;

}

/* BUTTON */

button{

width:100%;

padding:15px;

margin-top:24px;

background:#ff0000;

border:none;

border-radius:18px;

color:white;

font-size:16px;

font-weight:700;

cursor:pointer;

transition:0.3s;

}

button:hover{

background:#cc0000;

}

/* TEXT */

.bottom{

text-align:center;

margin-top:22px;

color:#aaaaaa;

}

.bottom a{

color:#ff0000;

text-decoration:none;

}

</style>

</head>

<body>

<div class="bg"></div>

<div class="box">

<div class="logo">

<img
src="images/logo.png">

Flash Edit

</div>

<input
type="email"
id="email"
placeholder="Enter Email">

<input
type="password"
id="password"
placeholder="Create Password">

<select id="role">

<option value="client">
Client
</option>

<option value="editor">
Editor
</option>

</select>

<button id="signupBtn">

Create Account

</button>

<div class="bottom">

Already have account?

<a href="login.html">

Login

</a>

</div>

</div>

<!-- FIREBASE -->

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getAuth,
createUserWithEmailAndPassword

}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

import {

getFirestore,
doc,
setDoc

}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

/* FIREBASE CONFIG */

const firebaseConfig = {

apiKey: "AIzaSyBNBmJcZ8qLYbVKTOrd5VgxKeRq0WRGlRs",

authDomain: "flash-edit.firebaseapp.com",

projectId: "flash-edit",

storageBucket: "flash-edit.firebasestorage.app",

messagingSenderId: "568937013589",

appId: "1:568937013589:web:dd4e2d926e2790b0f88fdc",

measurementId: "G-CBJTZMYKKL"

};

/* INIT */

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

/* SIGNUP BUTTON */

const signupBtn =
document.getElementById("signupBtn");

signupBtn.addEventListener("click",()=>{

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

const role =
document.getElementById("role").value;

/* VALIDATION */

if(email === "" || password === ""){

alert("Please fill all fields");

return;

}

/* CREATE ACCOUNT */

createUserWithEmailAndPassword(
auth,
email,
password
)

.then(async(userCredential)=>{

const user = userCredential.user;

/* SAVE ROLE */

await setDoc(
doc(db,"users",user.uid),
{

email:email,

role:role

}
);

alert("Account Created Successfully");

/* REDIRECT */

window.location.href =
"login.html";

})

.catch((error)=>{

alert(error.message);

});

});

</script>

</body>

</html>
