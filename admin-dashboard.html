<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Flash Edit Admin Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">

<style>

:root{

--bg:#0f0f0f;
--card:#181818;
--border:#272727;
--accent:#ff0000;
--text:#ffffff;
--sub:#aaaaaa;

}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Roboto',sans-serif;
background:var(--bg);
color:white;
overflow-x:hidden;

}

/* NAVBAR */

.navbar{

height:70px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 25px;
background:#111;
border-bottom:1px solid var(--border);
position:sticky;
top:0;
z-index:100;

}

.logo{

display:flex;
align-items:center;
gap:12px;
font-size:30px;
font-weight:900;

}

.logo img{

width:42px;
height:42px;
object-fit:contain;

}

.logout{

padding:12px 20px;
background:#ff0000;
border:none;
border-radius:14px;
color:white;
font-weight:700;
cursor:pointer;

}

/* LAYOUT */

.layout{
display:flex;
}

/* SIDEBAR */

.sidebar{

width:230px;
background:#111;
height:100vh;
padding:20px;
border-right:1px solid var(--border);
position:fixed;
top:70px;
left:0;

}

.menu{

padding:14px 18px;
display:block;
width:100%;
border-radius:14px;
margin-bottom:12px;
cursor:pointer;
transition:0.3s;

}

.menu:hover{

background:#272727;

}

/* MAIN */

.main{

margin-left:230px;
padding:30px;
width:100%;

}

/* HERO */

.hero{

height:260px;
border-radius:28px;
overflow:hidden;

background-image:url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1600&auto=format&fit=crop');

background-size:cover;
background-position:center;
position:relative;

display:flex;
align-items:end;

padding:35px;
margin-bottom:30px;

}

.hero::before{

content:"";
position:absolute;
inset:0;

background:
linear-gradient(
180deg,
rgba(0,0,0,0.1),
rgba(0,0,0,0.85)
);

}

.hero-content{

position:relative;
z-index:2;

}

.hero h1{

font-size:42px;
margin-bottom:10px;

}

/* STATS */

.stats{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:20px;

margin-bottom:30px;

}

.stat{

background:var(--card);
padding:28px;
border-radius:24px;
border:1px solid var(--border);

}

.stat h2{

font-size:38px;
color:var(--accent);
margin-bottom:10px;

}

/* PROJECTS */

.grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(340px,1fr));

gap:25px;

}

.project{

background:var(--card);
padding:25px;
border-radius:24px;
border:1px solid var(--border);

}

.project h3{

margin-bottom:14px;

}

.project p{

color:var(--sub);
line-height:1.7;
margin-bottom:14px;

}

.status{

display:inline-block;
padding:8px 14px;
border-radius:30px;
font-size:14px;
margin-bottom:18px;
color:white;

}

button{

width:100%;
padding:14px;
margin-top:12px;
background:#ff0000;
border:none;
border-radius:14px;
color:white;
font-weight:700;
cursor:pointer;

}

img{

width:100%;
border-radius:18px;
margin-top:15px;
margin-bottom:15px;
border:1px solid #333;

}

/* MOBILE */

@media(max-width:900px){

.navbar{
height:auto;
min-height:64px;
padding:12px 16px;
gap:12px;
}

.logo{
font-size:22px;
gap:8px;
min-width:0;
}

.logo img{
width:34px;
height:34px;
}

.logout{
width:auto;
padding:10px 14px;
border-radius:12px;
margin-top:0;
flex:0 0 auto;
}

.layout{
display:block;
}

.sidebar{
width:100%;
height:auto;
position:sticky;
top:64px;
left:auto;
z-index:90;
display:flex;
gap:8px;
padding:10px 14px;
overflow-x:auto;
border-right:none;
border-bottom:1px solid var(--border);
scrollbar-width:none;
}

.sidebar::-webkit-scrollbar{
display:none;
}

.menu{
flex:0 0 auto;
margin-bottom:0;
padding:10px 13px;
border-radius:12px;
font-size:14px;
white-space:nowrap;
}

.main{
margin-left:0;
padding:18px 14px 28px;
width:100%;
}

.hero{
height:210px;
border-radius:18px;
padding:22px;
margin-bottom:20px;
}

.hero h1{
font-size:30px;
line-height:1.1;
}

.hero p{
font-size:14px;
line-height:1.5;
}

.stats{
grid-template-columns:repeat(3,minmax(0,1fr));
gap:10px;
margin-bottom:20px;
}

.stat{
padding:16px 12px;
border-radius:16px;
min-width:0;
}

.stat h2{
font-size:28px;
}

.stat p{
font-size:13px;
line-height:1.35;
}

.grid{
grid-template-columns:1fr;
gap:16px;
}

.project{
padding:18px;
border-radius:18px;
}

}

@media(max-width:520px){

.navbar{
padding:10px 12px;
min-height:58px;
}

.logo{
font-size:19px;
}

.logout{
padding:9px 12px;
font-size:13px;
}

.sidebar{
top:58px;
padding:8px 12px;
}

.main{
padding:14px 12px 24px;
}

.hero{
height:185px;
padding:18px;
border-radius:16px;
}

.hero h1{
font-size:25px;
}

.stats{
grid-template-columns:1fr;
}

.stat{
display:flex;
align-items:center;
justify-content:space-between;
gap:16px;
}

.stat h2{
margin-bottom:0;
}

button{
padding:12px;
}

}

</style>

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

<div class="logo">

<img src="images/logo.png">

Flash Edit

</div>

<button class="logout">

Logout

</button>

</div>

<div class="layout">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="menu">
🏠 Dashboard
</div>

<div class="menu">
💰 Payments
</div>

<div class="menu">
📂 Projects
</div>

<div class="menu">
👥 Users
</div>

<div class="menu">
⚙ Settings
</div>

</div>

<!-- MAIN -->

<div class="main">

<!-- HERO -->

<div class="hero">

<div class="hero-content">

<h1>

Admin Control Panel ⚡

</h1>

<p>

Manage payments, projects and approvals

</p>

</div>

</div>

<!-- STATS -->

<div class="stats">

<div class="stat">

<h2 id="totalProjects">
0
</h2>

<p>
Total Projects
</p>

</div>

<div class="stat">

<h2 id="pendingPayments">
0
</h2>

<p>
Pending Payments
</p>

</div>

<div class="stat">

<h2 id="activeProjects">
0
</h2>

<p>
Active Projects
</p>

</div>

</div>

<!-- PROJECTS -->

<div class="grid" id="projectsGrid">

</div>

</div>

</div>

<!-- FIREBASE -->

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getAuth,
onAuthStateChanged,
signOut

}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

import {

getFirestore,
doc,
getDoc,
collection,
onSnapshot,
updateDoc

}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {

apiKey: "AIzaSyBNBmJcZ8qLYbVKTOrd5VgxKeRq0WRGlRs",

authDomain: "flash-edit.firebaseapp.com",

projectId: "flash-edit",

storageBucket: "flash-edit.firebasestorage.app",

messagingSenderId: "568937013589",

appId: "1:568937013589:web:dd4e2d926e2790b0f88fdc",

measurementId: "G-CBJTZMYKKL"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

/* AUTH */

onAuthStateChanged(auth,async(user)=>{

if(user){

const userDoc =
await getDoc(
doc(db,"users",user.uid)
);

if(userDoc.exists()){

const data = userDoc.data();

if(data.role !== "admin"){

window.location.href =
"login.html";

}else{

loadProjects();

}

}

}else{

window.location.href =
"login.html";

}

});

/* LOGOUT */

document
.querySelector(".logout")
.addEventListener("click",()=>{

signOut(auth)

.then(()=>{

window.location.href =
"admin-login.html";

});

});

/* LIVE PROJECTS */

function loadProjects(){

onSnapshot(
collection(db,"projects"),

(snapshot)=>{

const grid =
document.getElementById("projectsGrid");

grid.innerHTML = "";

let total = 0;
let pending = 0;
let active = 0;

snapshot.forEach((docItem)=>{

total++;

const data = docItem.data();

if(
data.clientPaymentPending ||
data.paymentPending
){

pending++;

}

if(data.accepted){

active++;

}

grid.innerHTML += `

<div class="project">

<h3>

${data.title}

</h3>

<p>

Budget: ₹${data.budget || 0}

</p>

<p>

${data.instructions}

</p>

<div class="status"
style="
background:
${data.accepted
? '#16a34a'
: '#272727'};
">

${data.accepted
? 'Unlocked'
: 'Locked'}

</div>

${data.clientPaymentPending ? `

<div
style="
background:#332200;
padding:14px;
border-radius:14px;
margin-top:15px;
margin-bottom:15px;
color:#ffcc00;
font-weight:700;
text-align:center;
">

⏳ Client Payment Pending

</div>

<img
src="${data.clientPaymentProof}">

<button
onclick="approveClient('${docItem.id}')">

Approve Client Payment ✅

</button>

` : ``}

${data.paymentPending ? `

<div
style="
background:#332200;
padding:14px;
border-radius:14px;
margin-top:15px;
margin-bottom:15px;
color:#ffcc00;
font-weight:700;
text-align:center;
">

⏳ Editor Payment Pending

</div>

<img
src="${data.paymentProof}">

<button
onclick="approveEditor('${docItem.id}')">

Approve Editor Payment ✅

</button>

` : ``}

</div>

`;

});

document.getElementById("totalProjects").innerText =
total;

document.getElementById("pendingPayments").innerText =
pending;

document.getElementById("activeProjects").innerText =
active;

});

}

/* APPROVE CLIENT */

window.approveClient =
async(id)=>{

await updateDoc(
doc(db,"projects",id),
{

clientPaymentPending:false

}
);

alert(
"Client Payment Approved ✅"
);

};

/* APPROVE EDITOR */

window.approveEditor =
async(id)=>{

await updateDoc(
doc(db,"projects",id),
{

paymentPending:false,

accepted:true,

status:"Editing"

}
);

alert(
"Editor Payment Approved ✅"
);

};

</script>

</body>

</html>
